services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: llm-council-search:latest
    environment:
      PORT: "4001"
      DATA_DIR: /app/data
      ALLOWED_ORIGINS: http://localhost:4000,http://127.0.0.1:4000
      API_PROXY_TARGET: http://127.0.0.1:4001
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - ./docker-data:/app/data
    restart: unless-stopped
